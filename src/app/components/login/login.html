<div class="min-h-screen bg-background flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-surface-container-lowest rounded-[32px] shadow-2xl border border-outline-variant p-10 space-y-8">
    <div class="text-center">
      <div class="inline-flex items-center justify-center p-3 bg-primary text-on-primary rounded-2xl mb-4 shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined text-3xl">account_balance</span>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-on-surface">Bem-vindo de volta</h1>
      <p class="text-on-surface-variant mt-2">Acesse sua conta FinanceSys</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label for="email" class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">E-mail</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">mail</span>
          <input type="email" id="email" name="email" [(ngModel)]="loginData.email" 
            class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-transparent focus:border-primary rounded-2xl outline-none transition-all text-sm font-medium" 
            placeholder="Digite seu e-mail" required>
        </div>
      </div>

      <div class="space-y-2">
        <label for="password" class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Senha</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">lock</span>
          <input type="password" id="password" name="password" [(ngModel)]="loginData.password" 
            class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-transparent focus:border-primary rounded-2xl outline-none transition-all text-sm font-medium" 
            placeholder="Digite sua senha" required>
        </div>
      </div>

      <div class="flex items-center justify-between px-1">
        <label class="flex items-center gap-2 text-xs font-medium text-on-surface-variant cursor-pointer">
          <input type="checkbox" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
          Lembrar-me
        </label>
        <a href="#" class="text-xs font-bold text-primary hover:underline">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="w-full py-4 bg-primary text-on-primary rounded-full font-bold shadow-lg hover:bg-primary/90 transition-all active:scale-95">
        Entrar na conta
      </button>
    </form>

    <div class="text-center pt-4 border-t border-outline-variant/30">
      <p class="text-sm text-on-surface-variant">
        Ainda não tem conta? 
        <a routerLink="/register" class="font-bold text-primary hover:underline">Cadastre-se aqui</a>
      </p>
    </div>
  </div>
</div>
