<div class="login-container">
  <div class="login-box">
    <h2>Bem-vindo de volta</h2>
    <p>Faça login para acessar o sistema</p>

    <form (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" [(ngModel)]="loginData.email" placeholder="Digite seu e-mail" required>
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" [(ngModel)]="loginData.password" placeholder="Digite sua senha" required>
      </div>

      <button type="submit" class="login-btn">Entrar</button>
    </form>

    <div class="login-footer">
      <a href="#">Esqueceu a senha?</a>
      <p>Ainda não tem conta? <a routerLink="/register">Cadastre-se aqui</a></p>
    </div>
  </div>
</div>
